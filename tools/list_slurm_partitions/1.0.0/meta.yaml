name: list_slurm_partitions
version: 1.0.0
summary: Slurm 파티션별 노드/용량/시간제한 요약 (sinfo 래퍼, pre-flight 체크용).
description: |
  `sinfo`를 호출해서 파티션별 구조화된 요약을 반환합니다. LLM이 `submit_*` 계열
  도구를 호출하기 전에 "이 파티션에 여유 노드가 있는가?"를 확인하는 pre-flight
  도구입니다.

  mode: read-all (§18.2). Observability 전용 — mutate 하지 않고, 사용자 필터링도
  하지 않습니다. 클러스터 전체의 파티션 상태를 그대로 보여줍니다.

  # 언제 호출하는가
  - `submit_lsdyna_job`, `submit_distributed_train`, `train_pytorch_gpu` 등을
    부르기 직전에 대상 파티션이 살아 있는지 확인하고 싶을 때
  - "어떤 GPU 파티션을 쓸 수 있어?", "지금 cpu 파티션 비어 있어?" 같은 질문
  - 특정 파티션의 default time limit / GRES 사양이 궁금할 때

  # 호출하지 말아야 할 때
  - 특정 노드 한 대 상세가 필요하면 `show_slurm_node` (별도 도구)
  - 특정 요청(GPU n장, 노드 m대)이 지금 들어갈 수 있는지 verdict 가 필요하면
    `check_partition_capacity` (별도 도구)
  - squeue 정보가 필요하면 `job_status` — sinfo와 squeue를 섞지 않습니다 (§21.5).

  # 동작
  - `sinfo -h --format=%P|%a|%l|%D|%T|%C|%G` (partition|avail|timelimit|nodes|state|cpus|gres)
  - 같은 파티션에 여러 node-group (state별로 row 가 나뉨) 이 있으면 파티션 단위로
    aggregate 해서 `nodes_idle / nodes_mixed / nodes_allocated / nodes_down /
    nodes_total` 을 계산합니다.
  - 캐싱하지 않습니다 (§21.4) — 매번 sinfo 를 새로 호출합니다.

  # Pre-conditions
  - 호스트 PATH 에 `sinfo` 가 있어야 합니다. 없으면 ok=false, reason="sinfo not on PATH".

  # Returns
  ```json
  {
    "ok": true,
    "tool": "list_slurm_partitions",
    "partitions": [
      {
        "name": "cpu",
        "state": "up",
        "default_time_limit": "1-00:00:00",
        "nodes_total": 32,
        "nodes_idle": 12,
        "nodes_mixed": 18,
        "nodes_allocated": 2,
        "nodes_down": 0,
        "gres_summary": null
      },
      {
        "name": "gpu-a100",
        "state": "up",
        "default_time_limit": "8:00:00",
        "nodes_total": 8,
        "nodes_idle": 1,
        "nodes_mixed": 5,
        "nodes_allocated": 2,
        "nodes_down": 0,
        "gres_summary": "gpu:a100:8"
      }
    ]
  }
  ```
tags: [slurm, sinfo, partition, capacity, preflight, observability]
transport:
  kind: local
  shell: /bin/bash
  timeout_sec: 30
expose: catalog
examples:
  - title: 모든 파티션 요약
    args: {}
  - title: gpu-a100 파티션만
    args: {partition_filter: "gpu-a100"}
  - title: down 노드만 있는 파티션은 숨기기
    args: {include_down: false}
