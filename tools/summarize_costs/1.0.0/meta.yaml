name: summarize_costs
version: 1.0.0
summary: 본인의 registry 잡들을 기간으로 합산해 realized cost 와 tool/partition 별 분해를 반환.
description: |
  사용자(=`$USER`)가 제출한 잡들의 실현 비용을 합산하는 post-hoc 도구입니다.
  registry 의 `extra.cpus`, `extra.gpus`, `extra.gpu_partition`/`partition`, 그리고
  기록된 `time_limit` 을 가지고 §28 의 estimate_cost 와 같은 공식을 적용합니다.

  **Isolation mode: own (§18.2).** `registry.list_recent(user=$USER, ...)` 만 호출하므로
  타 사용자 잡은 절대 포함되지 않습니다. 식별값은 환경의 `$USER` 에서만 옵니다 — args
  에 `actor`/`owner`/`user` 받지 않습니다 (§18.4).

  # 언제 호출하는가
  - "이번 달 내가 쓴 cluster 비용 얼마야?"
  - "지난 주에 끝난 잡들 cost 합산해줘"

  # 호출하지 말아야 할 때
  - 제출하기 전 견적이 궁금하면 `estimate_cost`.
  - 잡 메타데이터만 보려면 `my_jobs` / `list_recent_jobs`.

  # 동작
  1. `since` 미지정 시 30일 전 epoch, `until` 미지정 시 현재. `until <= submitted_at` 은
     `registry.list_recent` 가 SQL-side `since` 만 지원하므로 Python 에서 후필터.
  2. 각 row 에 대해:
     - 비용 계산 가능 필드 (`extra.cpus`, `extra.gpus`, `extra.time_limit`,
       partition (`extra.gpu_partition` 우선, 없으면 `extra.partition`)) 가 누락되거나
       `status == "dry_run"` 이면 건너뛰고 `skipped` 카운터를 올림.
     - `STMC_COST_RATES_FILE` 의 요율로 같은 공식 적용.
  3. 응답 (§28 마지막 줄): `{period, total, by_tool, by_partition, jobs_counted, skipped, ...}`.
  4. **부수효과 없음** — registry 도 audit 도 쓰지 않습니다 (§25.3).

  # Pre-conditions
  - `cost_rates.yaml` 이 배포되어 있어야 합니다 (§28.1). 없으면 ok:false.
  - `$USER` 또는 `$LOGNAME` 가 설정되어 있어야 합니다 (§18.1).

  # Returns
  ```json
  {
    "ok": true,
    "tool": "summarize_costs",
    "period": {"since": 1714000000, "until": 1716592000},
    "unit": "KRW",
    "total": 422400,
    "by_tool": [
      {"tool": "submit_distributed_train", "count": 2, "cost": 422400}
    ],
    "by_partition": [
      {"partition": "gpu_a100", "count": 2, "cost": 422400}
    ],
    "jobs_counted": 2,
    "skipped": 1,
    "caveat": "Realized cost uses each job's recorded time_limit (upper bound). Real wall-time may be lower."
  }
  ```
tags: [cost, accounting, summary, mode-own]
transport:
  kind: local
  shell: /bin/bash
  timeout_sec: 30
expose: catalog
examples:
  - title: 기본 (지난 30일)
    args: {}
  - title: 명시적 기간 (epoch 범위)
    args: {since: 1714000000, until: 1716592000}
