name: single_drop_simulation
version: 1.0.0
summary: LS-DYNA 지정 각도(roll/pitch/yaw) 1방향 낙하 시뮬 — KooChainRun.
description: |
  KooChainRun으로 지정한 단일 각도(roll/pitch/yaw) 낙하 시뮬을 prepare → submit합니다.
  KooChainRun에 'manual' source_type이 없어서 pitching_sweep(pitch_min=pitch_max) 트릭으로 1방향만 생성.

  # 언제 호출하는가
  - "30도 굴려서 떨어뜨려봐", "특정 각도로 낙하 테스트"
  - 모델 디버그용 빠른 1방향 검증
  - 162각도 전각도 잡 전에 한 케이스만 sanity check

  # 다른 tool과 구분
  - 162방향 fibonacci 전각도 → `fullangle_drop_simulation`
  - 이미 .k에 모든 카드 다 들어있는 raw LS-DYNA 잡 → `submit_lsdyna_job`

  # 사전 조건
  - `/data/SmartTwinPreprocessor/bin/KooChainRun` 설치되어 있어야 함
  - `work_dir`에 `model_file`로 지정한 .k 파일이 이미 있거나, `model_file_path`로 절대경로 명시

  # 동작
  1. scenario.json 생성 (지정 각도 1방향, pitching_sweep 트릭)
  2. `KooChainRun prepare scenario.json` → runner_config.json
  3. `dry_run=true`면 여기까지. false면 `KooChainRun submit runner_config.json` → Slurm jobs
  4. /data/SmartTwinMCP/jobs.db 레지스트리에 기록 (영속, 세션 끊겨도 list_recent_jobs로 조회 가능)

  # 반환
  ```json
  {
    "ok": true,
    "registry_id": 42,
    "tool": "single_drop_simulation",
    "work_dir": "/data/...",
    "output_dir": "/data/.../output",
    "scenario_path": "...",
    "runner_config_path": "...",
    "slurm_job_ids": ["100"],
    "angle": {"roll": 30, "pitch": 45, "yaw": 0},
    "status": "submitted" | "dry_run",
    "follow_up_hint": "job_status / job_stop / job_diagnose 등에 work_dir 인자로 사용"
  }
  ```

  # 실패 패턴
  - ok=false + reason 문자열 반환. 흔한 원인:
    - KooChainRun 미설치
    - work_dir 생성 실패 (권한)
    - 모델 파일 .k 없음
    - LSTC IP 잘못 (submit는 성공해도 시뮬 5초만에 fail — log 확인 필요)
tags: [lsdyna, drop_test, simulation, slurm, koochainrun, single, manual_angle, mode-own]
aliases: [drop_single, single_angle_drop, manual_drop]
transport:
  kind: local
  shell: /bin/bash
  timeout_sec: 120
expose: direct
examples:
  - title: 기본 (0,0,0 수직낙하, dry_run)
    args:
      work_dir: /data/koopark/quick_drop
      model_file: MinimumModel.k
      lstc_license_ip: 192.168.122.1
      dry_run: true
  - title: 지정 각도 (roll 30, pitch 45)
    args:
      work_dir: /data/koopark/angled_drop
      model_file: MinimumModel.k
      lstc_license_ip: 192.168.122.1
      roll_deg: 30
      pitch_deg: 45
      yaw_deg: 0
      dry_run: true
  - title: 실제 submit + 시뮬 시간 줄여서 빠른 검증
    args:
      work_dir: /data/koopark/quick_drop
      model_file_path: /home/koopark/models/my_part.k
      lstc_license_ip: 192.168.122.1
      simulation_time_s: 0.001
      drop_height_mm: 2000
      dry_run: false
