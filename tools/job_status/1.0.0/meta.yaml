name: job_status
version: 1.0.0
summary: 잡 진행 상태 확인 (squeue + KooChainRun status).
description: |
  레지스트리에서 잡 찾아서 squeue + KooChainRun status 결과 통합 반환.
  Slurm job별 state(PENDING/RUNNING/COMPLETED/FAILED), output_dir 디스크 진행도 포함.

  # 인자: registry_id 또는 work_dir
  단순 .k 잡(submit_lsdyna_job)도 squeue 부분은 동작 (KooChainRun status는 skip).
tags: [status, squeue, jobs, monitor, mode-own]
aliases: [status, squeue, check]
transport: {kind: local, shell: /bin/bash, timeout_sec: 30}
expose: direct
examples:
  - title: registry_id로 조회
    args: {registry_id: 42}
  - title: work_dir로 조회
    args: {work_dir: /data/koopark/fullangle_test}
